events {}

http {
    gzip on;

    upstream frontend {
        server frontend:3000;
    }

    upstream backend {
        server backend:5000;
    }

    server {
        listen 80;
        
        root /usr/share/nginx/html;
        index index.html;

        # Static files
        location /static/ {
            try_files $uri =404;
        }

        # React app
        location / {
            try_files $uri /index.html;
        }
        location /api/ {
            proxy_pass http://backend/;
        }

        # WebSocket support
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Caching
        location ~* \.(js|css|png|jpg|jpeg|gif|ico)$ {
            expires 7d;
        }
    }
}