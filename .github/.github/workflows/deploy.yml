name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/key.pem
          chmod 600 ~/.ssh/key.pem

      - name: Deploy to EC2
        run: |
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/key.pem ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << 'EOF'

          echo "🚀 Connected to EC2"

          # Go to project directory (clone if not exists)
          if [ ! -d "SupaChat" ]; then
            git clone https://github.com/likhith777666/SupaChat.git
          fi

          cd SupaChat

          # Pull latest code
          git pull origin main

          # Create backend .env
          cd backend
          cat <<EOT > .env
          DATABASE_URL=${{ secrets.DATABASE_URL }}
          GROQ_API_KEY=${{ secrets.GROQ_API_KEY }}
          EOT

          cd ..

          # Create frontend .env (if needed)
          mkdir -p supachat-frontend
          cd supachat-frontend
          touch .env
          cd ..

          # Restart containers safely
          docker-compose down
          docker-compose up --build -d

          echo "✅ Deployment Complete"

          EOF
